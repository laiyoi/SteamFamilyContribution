name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish --configuration Release --output ./publish --no-build

    - name: Create release artifact
      run: |
        New-Item -ItemType Directory -Path ./release
        Copy-Item -Path ./publish/* -Destination ./release/ -Recurse
        Copy-Item -Path ./README.md -Destination ./release/
        Compress-Archive -Path ./release/* -DestinationPath ./SteamFamilyContribution.zip

    - name: Extract tag name
      id: extract_tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.extract_tag.outputs.tag }}
        name: Release ${{ steps.extract_tag.outputs.tag }}
        draft: false
        prerelease: false
        files: ./SteamFamilyContribution.zip
